<!DOCTYPE html>

<html lang="en">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale="1.0">

	<title>Paybill Report</title>

	<!-- Make Context Path available to JavaScript -->
	<script th:inline="javascript">
	    window.contextPath = /*[[@{/}]]*/ '';
	</script>

	<link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
	   <link rel="stylesheet" th:href="@{/css/header.css}">
	   <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}">
	   <link rel="stylesheet" th:href="@{/css/payslip-report.css}">

</head>

<body>

	<div th:replace="fragments/header :: header">
	</div>

	<div class="container-fluid mt-4">

		<div id="successPopup" class="alert alert-success" style="display:none;">
		</div>

		<div id="errorPopup" class="alert alert-danger" style="display:none;">
		</div>

		<div class="card shadow">

			<div class="card-header form-header">

				<h5 class="mb-0">

					Paybill Report

				</h5>

			</div>

			<div class="card-body">

				<div class="row mb-4">

					<div class="col-md-2">

						<label class="form-label">

							Year

							<span class="text-danger">

								*

							</span>

						</label>

						<select id="year" class="form-select">

							<option value="">

								Select Year

							</option>

						</select>

					</div>

					<div class="col-md-2">

						<label class="form-label">

							Month

							<span class="text-danger">

								*

							</span>

						</label>

						<select id="month" class="form-select">

							<option value="">

								Select Month

							</option>

							<option value="01">January</option>
							<option value="02">February</option>
							<option value="03">March</option>
							<option value="04">April</option>
							<option value="05">May</option>
							<option value="06">June</option>
							<option value="07">July</option>
							<option value="08">August</option>
							<option value="09">September</option>
							<option value="10">October</option>
							<option value="11">November</option>
							<option value="12">December</option>

						</select>

					</div>

				</div>

				<div class="row mb-4">

					<div class="col-md-12 text-center">

						<button type="button" class="btn btn-primary" id="btnSearch">

							<i class="bi bi-search"></i>

							View Report

						</button>

						<button type="button" class="btn btn-success ms-2" id="btnExport">

							<i class="bi bi-file-earmark-excel"></i>

							Export Excel

						</button>

						<button type="button" class="btn btn-secondary ms-2" id="btnClear">

							<i class="bi bi-arrow-clockwise"></i>

							Clear

						</button>

					</div>

				</div>

				<div class="table-responsive">

					<table id="reportTable" class="table table-bordered table-striped table-hover">

						<thead class="table-dark">

							<tr>

								<th>ID</th>

								<th>Name</th>

								<th>Category</th>

								<th>Category Desc</th>

								<th>YYMM</th>

								<th>Stipend</th>

								<th>Adjustment</th>

								<th>ITAX</th>

								<th>CESS</th>

								<th>CESS ADDL</th>

								<th>Gross Pay</th>

								<th>Net Pay</th>

								<th>Higher Tax</th>

							</tr>

						</thead>

						<tbody id="reportBody">

						</tbody>

					</table>

				</div>

				<div id="paginationContainer" class="mt-3">

				</div>

			</div>

			<div class="card-footer text-center">

				Developed & Maintained by C&IT, BSP

			</div>

		</div>

	</div>

	<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	   <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
	   <script th:src="@{/js/header.js}"></script>
	   <script th:src="@{/js/payslip-report.js}"></script>

</body>

</html>
