<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Post Into SAP</title>

    <script th:inline="javascript">
        window.contextPath = /*[[@{/}]]*/ '';
    </script>

    <link rel="icon" href="data:,">

    <link rel="stylesheet"
          th:href="@{/bootstrap/bootstrap.min.css}">

    <link rel="stylesheet"
          th:href="@{/css/bootstrap-icons.min.css}">

    <link rel="stylesheet"
          th:href="@{/css/header.css}">

    <link rel="stylesheet"
          th:href="@{/css/post-into-sap.css}">

</head>

<body>

    <!-- Header -->

    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container mt-4">

        <!-- Success Message -->

        <div id="successPopup"
             class="alert alert-success"
             style="display:none;">
        </div>

        <!-- Error Message -->

        <div id="errorPopup"
             class="alert alert-danger"
             style="display:none;">
        </div>

        <div class="card shadow">

            <div class="card-header form-header">

                <h5 class="mb-0">

                    Post Into SAP

                </h5>

            </div>

            <div class="card-body">

                <div class="row align-items-center mb-4">

                    <label class="col-md-3 col-form-label">

                        Previous Month YYMM

                        <span class="text-danger">*</span>

                    </label>

                    <div class="col-md-4">

                        <input
                               type="text"
                               id="yymm"
                               class="form-control"
                               readonly>

                    </div>

                </div>

                <div class="text-center mt-4">

                    <button
                            id="btnProceed"
                            class="btn btn-primary">

                        <i class="bi bi-cloud-upload-fill"></i>

                        Proceed

                    </button>

                </div>

            </div>

            <div class="card-footer text-center">

                Developed & Maintained by C&amp;IT, BSP

            </div>

        </div>

    </div>

    <!-- Confirmation Modal -->

    <div class="modal fade"
         id="confirmModal"
         tabindex="-1"
         aria-hidden="true">

        <div class="modal-dialog modal-dialog-centered">

            <div class="modal-content">

                <div class="modal-header bg-primary text-white">

                    <h5 class="modal-title">

                        Confirmation

                    </h5>

                    <button
                            type="button"
                            class="btn-close btn-close-white"
                            data-bs-dismiss="modal">

                    </button>

                </div>

                <div class="modal-body">

                    <div class="d-flex align-items-center">

                        <i class="bi bi-question-circle-fill text-primary fs-3 me-3"></i>

                        <span>

                            Are you sure you want to push salary into SAP?

                        </span>

                    </div>

                </div>

                <div class="modal-footer">

                    <button
                            type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                        Cancel

                    </button>

                    <button
                            type="button"
                            id="confirmProceed"
                            class="btn btn-primary">

                        Proceed

                    </button>

                </div>

            </div>

        </div>

    </div>

    <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>

    <script th:src="@{/js/post-into-sap.js}"></script>

</body>

</html>
