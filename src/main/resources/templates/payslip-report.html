<!DOCTYPE html>

<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Payslip Download</title>

<!-- Make Context Path available to JavaScript -->
<script th:inline="javascript">
    window.contextPath = /*[[@{/}]]*/ '';
</script>

 
   <link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
   <link rel="stylesheet" th:href="@{/css/header.css}">
   <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}">
   <link rel="stylesheet" th:href="@{/css/payslip-report.css}">

</head>

<body>

 

<div class="container-fluid mt-4">

    <div id="successPopup"
         class="alert alert-success"
         style="display:none;">
    </div>

    <div id="errorPopup"
         class="alert alert-danger"
         style="display:none;">
    </div>

    <div class="card shadow">

        <div class="card-header form-header">

            <h5 class="mb-0">

                Payslip Download

            </h5>

        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-3">

                    <label class="form-label">

                        DNB ID

                    </label>

                    <input
                            type="number"
                            id="id"
                            class="form-control"
                            placeholder="Enter DNB ID">

                </div>

                <div class="col-md-3">

                    <label class="form-label">

                        PAN

                    </label>

                    <input
                            type="text"
                            id="pan"
                            class="form-control"
                            maxlength="10"
                            placeholder="Enter PAN">

                </div>

                <div class="col-md-3">

                    <label class="form-label">

                        YYMM

                    </label>

                    <select
                            id="yymm"
                            class="form-select">

                        <option value="">

                            Select YYMM

                        </option>

                    </select>

                </div>

                <div class="col-md-3 d-flex align-items-end">

                    <button
                            class="btn btn-primary me-2"
                            id="btnSearch">

                        <i class="bi bi-search"></i>

                        Search

                    </button>

                    <button
                            class="btn btn-secondary"
                            id="btnClear">

                        <i class="bi bi-arrow-clockwise"></i>

                        Clear

                    </button>

                </div>

            </div>

            <hr>

            <div class="table-responsive">

                <table
                        class="table table-bordered table-striped table-hover"
                        id="payslipTable">

                    <thead class="table-dark">

                    <tr>

                        <th>DNB ID</th>

                        <th>Name</th>

                        <th>Category</th>

                        <th>YYMM</th>

                        <th>Month</th>

                        <th width="200">

                            Action

                        </th>

                    </tr>

                    </thead>

                    <tbody id="payslipBody">

                    </tbody>

                </table>

            </div>

            <div id="paginationContainer"
                 class="mt-3 text-center">

            </div>

        </div>

        <div class="card-footer text-center">

            Developed & Maintained by C&IT, BSP

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
   <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
   <script th:src="@{/js/header.js}"></script>
   <script th:src="@{/js/payslip-report.js}"></script>


</body>

</html>
