<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Update Master</title>

<!-- Make Context Path available to JavaScript -->
<script th:inline="javascript">
    window.contextPath = /*[[@{/}]]*/ '';
</script>

<link rel="stylesheet" th:href="@{/bootstrap/bootstrap.min.css}">
   <link rel="stylesheet" th:href="@{/css/header.css}">
   <link rel="stylesheet" th:href="@{/css/bootstrap-icons.min.css}">
   <link rel="stylesheet" th:href="@{/css/update-master.css}">

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-4">

    <div id="successPopup"
         class="alert alert-success"
         style="display:none;">
    </div>

    <div id="errorPopup"
         class="alert alert-danger"
         style="display:none;">
    </div>

    <div class="card shadow">

        <div class="card-header form-header">

            Update DNB Master

        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-4">

                    <label class="form-label">

                        Previous Month YYMM

                        <span class="text-danger">*</span>

                    </label>

                    <input type="text"
                           id="yymm"
                           class="form-control"
                           readonly>

                </div>

            </div>

            <div class="mt-4 text-center">

				<button
				    type="button"
				    class="btn btn-primary"
				    data-bs-toggle="modal"
				    data-bs-target="#confirmUpdateModal">

				    <i class="bi bi-arrow-repeat"></i>

				    Update Master

				</button>

            </div>

        </div>

        <div class="card-footer text-center">

            Developed & Maintained by C&IT, BSP

        </div>

    </div>

</div>

<!-- Confirmation Modal -->

<div class="modal fade"
     id="confirmUpdateModal"
     tabindex="-1"
     aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered">

        <div class="modal-content">

            <div class="modal-header bg-primary text-white">

                <h5 class="modal-title">

                    Confirmation

                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <div class="d-flex align-items-center">

                    <i class="bi bi-question-circle-fill
                              text-primary
                              fs-3
                              me-3"></i>

                    <span>

                        Are you sure you want to update DNB Master?

                    </span>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    type="button"
                    id="btnConfirmUpdate"
                    class="btn btn-primary">

                    Proceed

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
   <script th:src="@{/bootstrap/bootstrap.bundle.min.js}"></script>
   <script th:src="@{/js/header.js}"></script>
   <script th:src="@{/js/update-master.js}"></script>

</body>

</html>
