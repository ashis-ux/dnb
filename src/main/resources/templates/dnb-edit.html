
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit DNB Entry</title>

    <link rel="icon" href="data:,">

    <!-- Local Bootstrap -->

    <link rel="stylesheet"
          href="/bootstrap/bootstrap.min.css">

    <!-- Bootstrap Icons -->

	<link rel="stylesheet"
	      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- Custom CSS -->

    <link rel="stylesheet"
          href="/css/dnb-edit.css">
		  
		  <link rel="stylesheet"
		              href="/css/header.css">

</head>

<body>

    <!-- Header -->

		<div th:replace="fragments/header :: header">
		</div>
    <div class="container mt-4">

        <!-- Success Message -->

        <div id="successPopup"
             class="alert alert-success"
             style="display:none;">

        </div>

        <!-- Error Message -->

        <div id="errorPopup"
             class="alert alert-danger"
             style="display:none;">

        </div>

        <div class="card shadow">

            <div class="card-header form-header">

                <h5 class="mb-0">

                    Update Existing DNB Entry

                </h5>

            </div>

            <div class="card-body">

                <!-- Search Section -->

                <div class="row mb-4">

                    <label class="col-md-2 col-form-label">

                        DNB ID

                        <span class="required">*</span>

                    </label>

                    <div class="col-md-3">

                        <input type="number"
                               class="form-control"
                               id="searchId">

                    </div>

                    <div class="col-md-2">

                        <button type="button"
                                class="btn btn-primary"
                                onclick="searchDnb()">

                            <i class="bi bi-search"></i>

                            Search

                        </button>

                    </div>

                </div>

                <!-- Edit Form -->

                <div id="editSection"
                     style="display:none;">

                    <form id="dnbEditForm">

                        <hr>

                        <div class="row mb-3">

                            <label class="col-md-3 col-form-label">

                                Name

                                <span class="required">*</span>

                            </label>

                            <div class="col-md-9">

                                <input type="text"
                                       class="form-control"
                                       id="name"
                                       maxlength="50">

                            </div>

                        </div>

                        <div class="row mb-3">

                            <label class="col-md-3 col-form-label">

                                DOB

                            </label>

                            <div class="col-md-3">

                                <input type="date"
                                       class="form-control"
                                       id="dob">

                            </div>

                            <label class="col-md-3 col-form-label">

                                PAN

                            </label>

                            <div class="col-md-3">

                                <input type="text"
                                       class="form-control"
                                       id="pan"
                                       maxlength="10">

                            </div>

                        </div>

                        <div class="row mb-3">

                            <label class="col-md-3 col-form-label">

                                DOJ

                            </label>

                            <div class="col-md-3">

                                <input type="date"
                                       class="form-control"
                                       id="doj">

                            </div>

                            <label class="col-md-3 col-form-label">

                                DOS

                            </label>

                            <div class="col-md-3">

                                <input type="date"
                                       class="form-control"
                                       id="dos">

                            </div>

                        </div>

                        <div class="row mb-3">

                            <label class="col-md-3 col-form-label">

                                Gender

                            </label>

                            <div class="col-md-3">

                                <select class="form-select"
                                        id="sexCode">

                                    <option value="">
                                        Select
                                    </option>

                                    <option value="M">
                                        Male
                                    </option>

                                    <option value="F">
                                        Female
                                    </option>

                                </select>

                            </div>

                            <label class="col-md-3 col-form-label">

                                Emp Status

                            </label>

                            <div class="col-md-3">

                                <select class="form-select"
                                        id="empStatus">

                                    <option value="0">
                                        Active
                                    </option>

                                    <option value="1">
                                        Inactive
                                    </option>

                                </select>

                            </div>

                        </div>

                        <div class="row mb-3">

                            <label class="col-md-3 col-form-label">

                                Bank Code

                            </label>

                            <div class="col-md-3">

                                <select class="form-select"
                                        id="bankCd">

                                    <option value="">
                                        Select
                                    </option>

                                    <option value="SBI">
                                        SBI
                                    </option>

                                </select>

                            </div>

                            <label class="col-md-3 col-form-label">

                                Bank Account Number

                            </label>

                            <div class="col-md-3">

                                <input type="text"
                                       class="form-control"
                                       id="bankAcno"
                                       maxlength="17">

                            </div>

                        </div>

                        <div class="row mb-3">

                            <label class="col-md-3 col-form-label">

                                Category

                            </label>

                            <div class="col-md-3">

                                <select class="form-select"
                                        id="catg">

                                    <option value="">
                                        Select
                                    </option>

                                </select>

                            </div>

                            <label class="col-md-3 col-form-label">

                                Speciality

                            </label>

                            <div class="col-md-3">

                                <input type="text"
                                       class="form-control"
                                       id="speciality"
                                       maxlength="20">

                            </div>

                        </div>

                        <div class="row mb-4">

                            <label class="col-md-3 col-form-label">

                                Tuition Fee Indicator

                            </label>

                            <div class="col-md-3">

                                <select class="form-select"
                                        id="tuitionFeeInd">

                                    <option value="0">
                                        NO
                                    </option>

                                    <option value="1">
                                        YES
                                    </option>

                                </select>

                            </div>

                        </div>

                        <div class="text-center">

                            <button type="button"
                                    class="btn btn-success"
                                    onclick="updateDnb()">

                                <i class="bi bi-pencil-square"></i>

                                Update

                            </button>

                            <button type="reset"
                                    class="btn btn-secondary ms-2">

                                Reset

                            </button>

                        </div>

                    </form>

                </div>

            </div>

            <div class="card-footer text-center">

                Developed & Maintained by C&IT, BSP

            </div>

        </div>

    </div>

    <script src="/bootstrap/bootstrap.bundle.min.js"></script>

    <script src="/js/dnb-edit.js"></script>

</body>

</html>
