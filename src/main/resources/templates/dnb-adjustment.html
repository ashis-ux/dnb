<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>DNB Adjustment Entry</title>

 

    <link rel="stylesheet"
          href="/bootstrap/bootstrap.min.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="/bootstrap/all.min.css">

    <!-- Bootstrap Icons -->

	<!-- Custom CSS -->
		  <link rel="stylesheet"
		        href="/css/bootstrap-icons.min.css">
    <!-- Common Header CSS -->

    <link rel="stylesheet"
          href="/css/header.css">

    <!-- Existing Page CSS -->

    <link rel="stylesheet"
          th:href="@{/css/dnb-adjustment.css}">
		  
		 <script src="/js/header.js"></script>

</head>

<body>

<!-- Common Header -->

<div th:replace="~{fragments/header :: header}">
</div>

 

<!-- Main Card -->

<div class="attendance-card">
	
	<!-- Success Message -->

	<div id="successPopup"
	     class="message success-message"
	     style="display:none;">
	</div>

	<!-- Error Message -->

	<div id="errorPopup"
	     class="message error-message"
	     style="display:none;">
	</div>

    <!-- Card Header -->

    <div class="attendance-card-header">

        <div class="screen-title">

            Adjustment Entry

        </div>

        <div class="toolbar">

            <div class="yymm-group">

                <label>

                    YYMM

                </label>

                <input type="text"
                       id="yymm"
                       maxlength="6">

            </div>

            <button id="btnLoad"
                    class="btn btn-load">

                <i class="fa fa-search"></i>

                Load

            </button>

            <button id="btnSave"
                    class="btn btn-save">

                <i class="fa fa-floppy-disk"></i>

                Save

            </button>

            <button id="btnClear"
                    class="btn btn-clear">

                <i class="fa fa-rotate-left"></i>

                Clear

            </button>

            <button id="btnExit"
                    class="btn btn-exit">

                <i class="fa fa-right-from-bracket"></i>

                Exit

            </button>

        </div>

    </div>

    <!-- Table -->

    <div class="table-wrapper">

        <table id="adjustmentTable">

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>For Month</th>

                    <th>Days</th>

                    <th>Category / Period</th>

                    <th>Amount</th>

                    <th>Stop Adj</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="adjustmentBody">

            </tbody>

        </table>

    </div>

    <!-- Footer -->

    <div class="attendance-footer">

        Steel Authority of India Limited

    </div>

</div>

 

<script src="/bootstrap/bootstrap.bundle.min.js"></script>
 

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

 

<script th:src="@{/js/dnb-adjustment.js}"></script>

</body>

</html>
